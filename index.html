<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chess Players in Eden</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:1000px;
  margin:auto;
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
}

.card{
  border:1px solid #ddd;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>Chess Players in Eden</h1>
  
  <p><small>
Unofficial chess player search website for the Eden region.
Not affiliated with Eden Chess Union.
</small></p>

<input id="search" placeholder="Search by Name, ChessaID, FIDE ID or School">

<div id="results"></div>

<script>

let players=[];
  function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("Copied: " + text);
}

fetch('players.csv')
.then(response => response.text())
.then(text => {

    const rows = text.trim().split('\n');

    const headers = rows[0].split(',');

    players = rows.slice(1).map(row => {

        const values = row.split(',');

        let player = {};

        headers.forEach((header,index)=>{
            player[header.trim()] = values[index];
        });

        return player;
    });

});

document.getElementById('search').addEventListener('keyup', function(){

    const term = this.value.toLowerCase();

    const matches = players.filter(player =>
        JSON.stringify(player).toLowerCase().includes(term)
    );

    document.getElementById('results').innerHTML =
    matches.slice(0,50).map(player => `
        <div class="card">
            <strong>${player.DisplayName || ''}</strong><br>
            ChessaID: ${player.ChessaID || ''}<br>
            FIDE ID: ${player.FIDE_ID || ''}<br>
            School/Club: ${player["School/Club"] || ''}
        </div>
    `).join('');
  
});

</script>

</body>
</html>
