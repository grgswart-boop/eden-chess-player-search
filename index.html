<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Chess Players in Eden</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-bottom:10px;
}

button{
    padding:8px 12px;
    margin-top:5px;
    margin-right:5px;
    cursor:pointer;
}

.card{
    border:1px solid #ddd;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
}

#counter{
    margin-top:10px;
    font-weight:bold;
}

.dark-mode{
    background-color:#121212;
    color:white;
}

.dark-mode .card{
    background:#1e1e1e;
    border:1px solid #444;
}

.dark-mode input{
    background:#2d2d2d;
    color:white;
    border:1px solid #666;
}

</style>

</head>

<body>

<h1>♟️ Chess Players in Eden</h1>

<p>
<small>
Unofficial chess player search website for the Eden region.<br>
Not affiliated with Eden Chess Union.
</small>
</p>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<br><br>

<input id="search"
placeholder="Search by Name, ChessaID, FIDE ID or School">

<button onclick="clearSearch()">🧹 Clear Search</button>

<div id="counter"></div>

<div id="results"></div>

<script>

let players = [];

function copyText(text){

    navigator.clipboard.writeText(text);

    const msg = document.getElementById('message');

    msg.className = 'success';

    msg.style.display = 'block';

    msg.innerHTML = '✅ Copied: ' + text;

    setTimeout(() => {
        msg.style.display = 'none';
    }, 3000);
}
`

function clearSearch(){
    document.getElementById('search').value = '';
    document.getElementById('results').innerHTML = '';
    document.getElementById('counter').innerHTML = '';
}

function toggleDarkMode(){
    document.body.classList.toggle('dark-mode');
}

fetch('players.csv')
.then(response => response.text())
.then(text => {

    const rows = text.trim().split('\n');

    const headers = rows[0].split(',');

    players = rows.slice(1).map(row => {

        const values = row.split(',');

        let player = {};

        headers.forEach((header,index) => {
            player[header.trim()] = values[index];
        });

        return player;

    });

});

document.getElementById('search').addEventListener('keyup', function(){

    const term = this.value.toLowerCase();

    if(term === ''){
        document.getElementById('results').innerHTML = '';
        document.getElementById('counter').innerHTML = '';
        return;
    }

    const matches = players.filter(player =>
        JSON.stringify(player).toLowerCase().includes(term)
    );

    document.getElementById('counter').innerHTML =
        matches.length + ' player(s) found';

    if(matches.length === 0){

        document.getElementById('results').innerHTML =
            '<div class="card">No results found.</div>';

        return;
    }

    document.getElementById('results').innerHTML =
        matches.slice(0,50).map(player => `

            <div class="card">

                <strong>${player.DisplayName || ''}</strong><br>

                ChessaID: ${player.ChessaID || ''}<br>

                FIDE ID: ${player.FIDE_ID || ''}<br>

                School/Club: ${player["School/Club"] || ''}<br><br>

                <button onclick="copyText('${player.ChessaID}')">
                    📋 Copy ChessaID
                </button>

                <button onclick="copyText('${player.FIDE_ID}')">
                    📋 Copy FIDE ID
                </button>

            </div>

        `).join('');

});

</script>

</body>
</html>
